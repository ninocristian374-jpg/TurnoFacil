<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnoFácil — Recuperar contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b0f19;color:#f8fafc;padding:24px;}
        .card{background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 16px rgba(0,0,0,.4);}
        .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
        .brand-icon{width:36px;height:36px;background:#6366f1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;}
        .brand-name{font-size:17px;font-weight:600;color:#f8fafc;}
        h1{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px;}
        .subtitle{font-size:13.5px;color:#94a3b8;margin-bottom:24px;line-height:1.5;}
        .form-group{margin-bottom:18px;}
        label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px;}
        input{width:100%;padding:11px 14px;background:#0b0f19;border:1px solid rgba(255,255,255,0.08);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:#f8fafc;outline:none;transition:border-color .15s;}
        input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
        input::placeholder{color:#475569;}
        .btn-submit{width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s;margin-top:8px;}
        .btn-submit:hover{background:#4f46e5;}
        .link{font-size:13px;color:#94a3b8;text-align:center;margin-top:20px;}
        .link a{color:#818cf8;text-decoration:none;}
        .link a:hover{text-decoration:underline;}
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-icon"><i class="bi bi-calendar3" style="color:#fff;"></i></div>
        <span class="brand-name">TurnoFácil</span>
    </div>

    <h1>Recuperar contraseña</h1>
    <p class="subtitle">Ingresa tu dirección de correo electrónico registrado y te enviaremos las instrucciones para restablecer tu contraseña.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder="usuario@correo.com" required autofocus>
        </div>
        <button type="submit" class="btn-submit">Enviar enlace de recuperación</button>
    </form>

    <div class="link">
        <a href="{% url 'login' %}"><i class="bi bi-arrow-left"></i> Volver al inicio de sesión</a>
    </div>
</div>

</body>
</html>
