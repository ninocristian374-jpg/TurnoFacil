<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnoFácil — Contraseña restablecida</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b0f19;color:#f8fafc;padding:24px;}
        .card{background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 16px rgba(0,0,0,.4);text-align:center;}
        .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
        .brand-icon{width:36px;height:36px;background:#6366f1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;}
        .brand-name{font-size:17px;font-weight:600;color:#f8fafc;}
        .success-icon{font-size:48px;color:#34d399;margin-bottom:16px;}
        h1{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:8px;}
        .subtitle{font-size:14px;color:#94a3b8;margin-bottom:24px;line-height:1.6;}
        .btn-login{display:inline-block;width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;text-decoration:none;transition:background .2s;margin-top:8px;}
        .btn-login:hover{background:#4f46e5;}
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-icon"><i class="bi bi-calendar3" style="color:#fff;"></i></div>
        <span class="brand-name">TurnoFácil</span>
    </div>

    <div class="success-icon"><i class="bi bi-check2-circle"></i></div>
    <h1>Contraseña restablecida</h1>
    <p class="subtitle">¡Tu contraseña ha sido restablecida correctamente! Ya puedes utilizar tus nuevas credenciales para acceder a la plataforma.</p>

    <a href="{% url 'login' %}" class="btn-login">Iniciar sesión</a>
</div>

</body>
</html>
