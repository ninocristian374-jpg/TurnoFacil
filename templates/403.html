<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnoFácil — Acceso denegado</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:#f7f7f5;color:#1a1916;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .box{text-align:center;max-width:480px;}
        .code{font-family:'DM Mono',monospace;font-size:96px;font-weight:300;color:#fecaca;line-height:1;margin-bottom:16px;}
        .icon{font-size:48px;color:#dc2626;margin-bottom:20px;display:block;}
        h1{font-size:24px;font-weight:600;letter-spacing:-.3px;margin-bottom:10px;}
        p{font-size:15px;color:#6b6860;line-height:1.6;margin-bottom:32px;}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:#1a1916;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;transition:background .15s;}
        .btn:hover{background:#2d2b27;}
        .btn-sec{background:transparent;color:#6b6860;border:1px solid #e8e6e1;margin-left:8px;}
        .btn-sec:hover{background:#f0efec;color:#1a1916;}
        .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:20px;}
    </style>
</head>
<body>
<div class="box">
    <div class="code">403</div>
    <div class="badge"><i class="bi bi-shield-exclamation"></i> Acceso denegado</div>
    <i class="bi bi-lock icon"></i>
    <h1>No tienes permiso</h1>
    <p>No tienes autorización para acceder a esta página. Si crees que es un error, contacta al administrador.</p>
    <div>
        <a href="/" class="btn"><i class="bi bi-house"></i> Ir al inicio</a>
        <a href="javascript:history.back()" class="btn btn-sec"><i class="bi bi-arrow-left"></i> Volver</a>
    </div>
</div>
</body>
</html>
